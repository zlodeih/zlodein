<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zlodein Messenger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --mint: #3fe2a3; --mint-dark: #2bc389; --bg: #f4f7f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: #000; }
        body { display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 500px; height: 100dvh; background: var(--bg); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; background: var(--bg); position: absolute; }
        .screen.active { display: flex; position: relative; }
        .header { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .header h2 { color: var(--mint-dark); font-size: 20px; }
        .tabs { display: flex; background: white; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #a0aec0; font-weight: bold; font-size: 13px; }
        .tab.active { color: var(--mint-dark); border-bottom: 3px solid var(--mint-dark); }
        .list-area { flex: 1; overflow-y: auto; padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 18px; margin-bottom: 12px; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .card i { width: 40px; height: 40px; background: #eefdf6; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: var(--mint-dark); margin-right: 15px; }
        .msg-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fdfdfd; }
        .msg { max-width: 85%; padding: 10px 15px; border-radius: 20px; font-size: 14px; position: relative; }
        .msg.my { align-self: flex-end; background: var(--mint); color: white; border-bottom-right-radius: 2px; }
        .msg.not-my { align-self: flex-start; background: white; border-bottom-left-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .msg small { font-size: 10px; display: block; margin-bottom: 4px; opacity: 0.7; }
        audio { width: 200px; height: 35px; margin-top: 5px; }
        .input-panel { padding: 12px; background: white; display: flex; gap: 10px; align-items: center; border-top: 1px solid #eee; flex-shrink: 0; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
        .input-panel input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #eee; background: #f7fafc; outline: none; font-size: 16px; }
        .icon-btn { width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; font-size: 20px; color: var(--mint-dark); border: none; background: none; }
        .icon-btn.rec-active { color: #ff4d4d; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .add-btn { position: absolute; bottom: 85px; right: 20px; width: 55px; height: 55px; background: var(--mint); color: white; border-radius: 50%; border: none; font-size: 22px; box-shadow: 0 6px 16px rgba(0,0,0,0.1); z-index: 99; }
        #screen-login { justify-content: center; align-items: center; padding: 30px; }
        .login-box { background: white; padding: 40px 30px; border-radius: 30px; width: 100%; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screen-login" class="screen active">
        <div class="login-box">
            <h1 style="color:var(--mint-dark); margin-bottom:20px;">Zlodein</h1>
            <input type="text" id="user-name" style="width:100%; padding:15px; border-radius:15px; border:1px solid #eee; margin-bottom:20px;" placeholder="Ваш ник...">
            <button onclick="handleLogin()" style="width:100%; padding:16px; border-radius:18px; border:none; background:var(--mint); color:white; font-weight:bold;">ВОЙТИ</button>
        </div>
    </div>

    <div id="screen-main" class="screen">
        <div class="header"><h2>Zlodein</h2><button onclick="logout()" style="color:red; border:none; background:none; font-weight:bold;">ВЫХОД</button></div>
        <div class="tabs"><div class="tab active" id="t-g" onclick="tab('g')">ГРУППЫ</div><div class="tab" id="t-p" onclick="tab('p')">КОНТАКТЫ</div></div>
        <div id="l-g" class="list-area"></div>
        <div id="l-p" class="list-area" style="display:none;"></div>
        <button id="btn-plus" class="add-btn" onclick="addGroup()"><i class="fas fa-plus"></i></button>
    </div>

    <div id="screen-chat" class="screen">
        <div class="header"><i class="fas fa-chevron-left" onclick="closeChat()" style="color:var(--mint-dark); font-size:20px;"></i><b id="chat-title">Чат</b><div style="width:20px;"></div></div>
        <div id="messages" class="msg-container"></div>
        <div class="input-panel">
            <input type="text" id="msg-input" placeholder="Сообщение..." autocomplete="off">
            <button id="rec-btn" class="icon-btn" onclick="toggleRecord()"><i class="fas fa-microphone"></i></button>
            <button class="icon-btn" onclick="send()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCQqR7WasGjOyfwYroi15Fgs3k_w7wfnxc",
        authDomain: "zlodein.firebaseapp.com",
        projectId: "zlodein",
        databaseURL: "https://zlodein-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let myName = localStorage.getItem('zl_name');
    let activePath = null;
    let mediaRecorder;
    let isRecording = false;

    // ПРИНУДИТЕЛЬНЫЙ ЗАПРОС ПРИ КЛИКЕ
    async function requestPermission() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(t => t.stop());
            return true;
        } catch (e) {
            alert("Чтобы голосовые работали, нужно разрешить микрофон в настройках браузера!");
            return false;
        }
    }

    async function handleLogin() {
        const n = document.getElementById('user-name').value.trim();
        if(n) {
            const ok = await requestPermission(); // Запрос прямо в момент клика
            myName = n;
            localStorage.setItem('zl_name', n);
            db.ref('users/'+n).set({last: Date.now()});
            init();
        }
    }

    function logout() { localStorage.removeItem('zl_name'); location.reload(); }

    function tab(t) {
        document.getElementById('l-g').style.display = t==='g'?'block':'none';
        document.getElementById('l-p').style.display = t==='p'?'block':'none';
        document.getElementById('t-g').className = 'tab'+(t==='g'?' active':'');
        document.getElementById('t-p').className = 'tab'+(t==='p'?' active':'');
    }

    function init() {
        document.getElementById('screen-login').classList.remove('active');
        document.getElementById('screen-main').classList.add('active');
        db.ref('groups').on('value', s => {
            const c = document.getElementById('l-g'); c.innerHTML = '';
            s.forEach(child => {
                let d = document.createElement('div'); d.className = 'card';
                d.innerHTML = `<i class="fas fa-hashtag"></i><b>${child.val().name}</b>`;
                d.onclick = () => openChat('groups/'+child.key, child.val().name);
                c.appendChild(d);
            });
        });
        db.ref('users').on('value', s => {
            const c = document.getElementById('l-p'); c.innerHTML = '';
            s.forEach(child => {
                if(child.key === myName) return;
                let d = document.createElement('div'); d.className = 'card';
                d.innerHTML = `<i class="fas fa-user"></i><b>${child.key}</b>`;
                d.onclick = () => openChat('private/'+[myName, child.key].sort().join('_'), child.key);
                c.appendChild(d);
            });
        });
    }

    async function openChat(path, name) {
        activePath = path;
        document.getElementById('chat-title').innerText = name;
        document.getElementById('screen-main').classList.remove('active');
        document.getElementById('screen-chat').classList.add('active');
        
        const area = document.getElementById('messages');
        db.ref('chats/'+path).off();
        db.ref('chats/'+path).on('value', s => {
            area.innerHTML = '';
            s.forEach(m => {
                const v = m.val();
                let d = document.createElement('div');
                d.className = 'msg ' + (v.u === myName ? 'my' : 'not-my');
                if(v.type === 'voice') d.innerHTML = `<small>${v.u}</small><audio controls src="${v.t}"></audio>`;
                else d.innerHTML = `<small>${v.u}</small>${v.t}`;
                area.appendChild(d);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function send() {
        const i = document.getElementById('msg-input');
        if(i.value.trim() && activePath) {
            db.ref('chats/'+activePath).push({ u: myName, t: i.value, type: 'text' });
            i.value = '';
        }
    }

    async function toggleRecord() {
        const btn = document.getElementById('rec-btn');
        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => {
                        db.ref('chats/'+activePath).push({ u: myName, t: reader.result, type: 'voice' });
                    }
                };
                mediaRecorder.start();
                isRecording = true;
                btn.classList.add('rec-active');
            } catch (err) {
                alert("Микрофон недоступен. Проверьте настройки сайта!");
            }
        } else {
            mediaRecorder.stop();
            isRecording = false;
            btn.classList.remove('rec-active');
        }
    }

    function closeChat() { document.getElementById('screen-chat').classList.remove('active'); document.getElementById('screen-main').classList.add('active'); }
    function addGroup() { const n = prompt("Название группы:"); if(n) db.ref('groups').push({name:n, owner:myName}); }

    if(myName) init();
</script>
</body>
</html>
